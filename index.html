<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== NAVBAR START ===== -->
<header>
  <h2>MySite</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#blog">Blog</a>
    <a href="#contact">Contact</a>
  </nav>
</header>
<!-- ===== NAVBAR END ===== -->


<!-- ===== HOME SECTION START ===== -->
<!-- ===== HOME SECTION START ===== -->
<section id="home" class="home">

  <!-- ===== OVERLAY ===== -->
  <div class="overlay"></div>

  <!-- ===== TOP LEFT CONTENT ===== -->
  <div class="home-text">
    <h1>Welcome</h1>
    <p>This is a modern website design</p>
  </div>

  <!-- ===== CENTER LOGIN BUTTON ===== -->
  <div class="login-center">
    <button id="loginBtn">Login</button>
  </div>
  
 <!-- ===== POPUP OVERLAY ===== -->
<div class="popup-overlay" id="popupOverlay">

  <!-- ===== 3D LOGIN CARD ===== -->
  <div class="popup">
    <span id="closeBtn" class="close-popup">&times;</span>

    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <div class="popup-buttons">

      <button id="loginSubmitBtn">Login</button>
    
      <button id="signupBtn">Sign Up</button>
    
    </div>

  </div>

</div>

</section>
<!-- ===== HOME SECTION END ===== -->
<!-- ===== HOME SECTION END ===== -->


<!-- ===== ABOUT SECTION START ===== -->
<section id="about" class="about">
  <h2>About Us</h2>
  <p>This section contains information about the website or company.</p>
</section>
<!-- ===== ABOUT SECTION END ===== -->


<!-- ===== BLOG SECTION START ===== -->
<section id="blog" class="blog">
  <h2>Blog</h2>
  <div class="blog-container">
    <div class="blog-card">Blog 1</div>
    <div class="blog-card">Blog 2</div>
    <div class="blog-card">Blog 3</div>
  </div>
</section>
<!-- ===== BLOG SECTION END ===== -->


<!-- ===== CONTACT SECTION START ===== -->
<section id="contact" class="contact">
  <h2>Contact Us</h2>
  <input type="text" placeholder="Your Name"><br>
  <input type="email" placeholder="Your Email"><br>
  <textarea placeholder="Your Message"></textarea><br>
  <button>Send</button>
</section>
<!-- ===== CONTACT SECTION END ===== -->


<!-- ===== FOOTER START ===== -->
<footer>
  <p>© 2026 My Website</p>
</footer>
<!-- ===== FOOTER END ===== -->


<script src="script.js"></script>
</body>
</html>
